<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Game Launcher Setup</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="page-header">
      <h1>Number Pair Match</h1>
      <p>Game Setup</p>
    </header>

    <main class="container">
      <section class="card">
        <form id="setupForm">
          <div class="form-row">
            <label for="playerName">Player Name:</label>
            <input type="text" id="playerName" placeholder="Enter your name" />
          </div>

          <div class="form-row">
            <label for="boardSize">Board Size:</label>
            <select id="boardSize">
              <option value="4x4">4x4 (8 Pairs)</option>
              <option value="4x5">4x5 (10 Pairs)</option>
              <option value="6x6">6x6 (18 Pairs)</option>
            </select>
          </div>

          <div class="form-row">
            <label for="difficulty">Difficulty:</label>
            <select id="difficulty">
              <option value="easy">Easy</option>
              <option value="medium" selected>Medium</option>
              <option value="hard">Hard</option>
            </select>
          </div>

          <fieldset>
            <legend>Pair Type</legend>
            <label class="option-line"><input type="radio" name="pairType" value="numberWord" checked> Number & Word</label>
            <label class="option-line"><input type="radio" name="pairType" value="sumAnswer"> Sum & Answer</label>
            <label class="option-line"><input type="radio" name="pairType" value="mixed"> Mixed</label>
          </fieldset>

          <fieldset>
            <legend>Additional Options</legend>
            <label class="option-line"><input type="checkbox" id="showTimer" checked> Show Timer</label>
            <label class="option-line"><input type="checkbox" id="enableHints" checked> Enable Hints</label>
            <label class="option-line"><input type="checkbox" id="shuffleAnimation" checked> Shuffle Animation</label>
          </fieldset>
        </form>

        <div class="preview-box">
          <strong>Live Preview:</strong>
          <span id="previewText">No settings selected yet.</span>
        </div>

        <div class="button-row" style="margin-top: 20px;">
          <button type="button" id="openGameBtn">Launch Game</button>
          <button type="button" id="saveSettingsBtn">Save Settings</button>
          <button type="button" id="loadSettingsBtn">Load Settings</button>
          <button type="button" id="resetSettingsBtn">Reset Form</button>
          <button type="button" onclick="window.location.href = 'instructions.html'">How to Play</button>
        </div>
      </section>
    </main>

    <script src="launcher.js"></script>
  </body>
</html>
